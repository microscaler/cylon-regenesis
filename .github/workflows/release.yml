name: Release

# Publishes regenesis-agent + systemd units for bare-metal / iPXE installs.
# Asset names match docs/host-regenesis/ipxe-provisioning.md (REG-AGENT-09).
#
# Tag a release:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0). Required for workflow_dispatch."
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          tag_ver="${tag#v}"
          file_ver="$(tr -d '[:space:]' < VERSION)"
          script_ver="$(grep '^VERSION=' scripts/regenesis-agent | sed -n 's/^VERSION="\(.*\)"$/\1/p')"
          if [[ "${tag_ver}" != "${file_ver}" || "${file_ver}" != "${script_ver}" ]]; then
            echo "Tag (${tag_ver}), VERSION (${file_ver}), and script (${script_ver}) must match" >&2
            exit 1
          fi

      - name: Package release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/systemd dist/config
          install -m 0755 scripts/regenesis-agent dist/regenesis-agent-linux-x86_64
          install -m 0644 systemd/cylon-host.service dist/systemd/
          install -m 0644 systemd/regenesis-agent.service dist/systemd/
          install -m 0644 config/regenesis-base.env dist/config/
          install -m 0644 ipxe/cylon-resurrection.ipxe dist/
          (cd dist && sha256sum regenesis-agent-linux-x86_64 > regenesis-agent-linux-x86_64.sha256)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regenesis-release
          path: dist/
          if-no-files-found: error

  publish-release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: regenesis-release
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            dist/regenesis-agent-linux-x86_64
            dist/regenesis-agent-linux-x86_64.sha256
            dist/cylon-resurrection.ipxe
            dist/systemd/cylon-host.service
            dist/systemd/regenesis-agent.service
            dist/config/regenesis-base.env
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
